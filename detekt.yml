exceptions:
  TooGenericExceptionCaught:
    # JDBC operations surface unexpected runtime exceptions through unwrapping — catching
    # Exception at transaction and protocol boundaries is intentional
    active: false
style:
  ForbiddenComment:
    # TODOs are intentional and tracked in code — do not flag them as violations
    active: false
  MagicNumber:
    active: false
  ThrowsCount:
    # Validation functions legitimately throw for each distinct invalid input — disabling the cap
    active: false
complexity:
  CyclomaticComplexMethod:
    threshold: 20
  LongParameterList:
    # mergeFromStaging takes exactly the minimum set of parameters it needs — no gratuitous args
    functionThreshold: 7
  NestedBlockDepth:
    # JDBC use{} + for + try + when dispatch naturally reaches depth 4; Detekt checks >= threshold
    threshold: 5
  TooManyFunctions:
    # PostgresCopyStrategy has one override plus SQL-builder helpers — none are gratuitous
    thresholdInClasses: 12
