name: Release

on:
  release:
    types: [published]

jobs:
  attach-cli:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4

      - name: Build CLI fat JAR
        run: ./gradlew :cli:shadowJar

      - name: Attach CLI to release
        run: |
          JAR=$(ls cli/build/libs/*.jar | head -1)
          ASSET="upsert-cli-${{ github.event.release.tag_name }}.jar"
          cp "$JAR" "$ASSET"
          gh release upload ${{ github.event.release.tag_name }} "$ASSET" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
